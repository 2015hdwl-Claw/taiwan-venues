<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣場地管理系統 - 場地清單</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .header .stat {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 10px;
        }
        .header .stat-number {
            font-size: 28px;
            font-weight: bold;
        }
        .header .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* 篩選器樣式 */
        .filters {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-group label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .filter-group select {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            background: white;
            min-width: 120px;
        }
        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* 操作按鈕區 */
        .actions {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover {
            background: #218838;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        
        .venues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .venue-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        .venue-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .venue-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #e0e0e0;
        }
        .venue-content {
            padding: 20px;
        }
        .venue-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .venue-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        .venue-info strong {
            color: #333;
        }
        .venue-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        .tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .tag.capacity {
            background: #e8f5e9;
            color: #388e3c;
        }
        .tag.price {
            background: #fff3e0;
            color: #f57c00;
        }
        .tag.no-photo {
            background: #ffebee;
            color: #c62828;
        }
        
        /* 編輯按鈕 */
        .edit-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.9);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transition: all 0.3s;
        }
        .edit-btn:hover {
            background: white;
            transform: scale(1.1);
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 14px;
        }
        
        /* Modal 樣式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 15px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        .modal-header h2 {
            font-size: 20px;
            color: #333;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            padding: 5px;
        }
        .modal-close:hover {
            color: #333;
        }
        .modal-body {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .modal-footer {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            position: sticky;
            bottom: 0;
            background: white;
        }
        
        /* 載入中提示 */
        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 提示訊息 */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            background: #28a745;
        }
        .toast.error {
            background: #dc3545;
        }
        
        /* 搜尋框 */
        .search-box {
            flex: 1;
            min-width: 200px;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* 分頁 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 8px 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .pagination button:hover {
            border-color: #667eea;
            color: #667eea;
        }
        .pagination button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 標記已修改 */
        .modified-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff9800;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏛️ 台灣場地管理系統</h1>
        <p id="lastUpdate">載入中...</p>
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="displayCount">0</div>
                <div class="stat-label">顯示場地</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">總場地數</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="modifiedCount">0</div>
                <div class="stat-label">已修改</div>
            </div>
        </div>
    </div>
    
    <!-- 篩選器 -->
    <div class="filters">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜尋場地名稱、城市...">
        </div>
        <div class="filter-group">
            <label>城市:</label>
            <select id="cityFilter">
                <option value="">全部</option>
            </select>
        </div>
        <div class="filter-group">
            <label>類型:</label>
            <select id="typeFilter">
                <option value="">全部</option>
            </select>
        </div>
        <div class="filter-group">
            <label>照片:</label>
            <select id="photoFilter">
                <option value="">全部</option>
                <option value="hasPhoto">有照片</option>
                <option value="noPhoto">無照片</option>
            </select>
        </div>
        <div class="filter-group">
            <label>狀態:</label>
            <select id="statusFilter">
                <option value="">全部</option>
                <option value="上架">上架</option>
                <option value="下架">下架</option>
                <option value="待審核">待審核</option>
            </select>
        </div>
        <div class="actions">
            <button class="btn btn-secondary" onclick="resetFilters()">重置</button>
            <button class="btn btn-success" onclick="exportJSON()">📥 匯出 JSON</button>
        </div>
    </div>
    
    <div class="venues-grid" id="venuesGrid">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>載入場地資料中...</p>
        </div>
    </div>
    
    <div class="pagination" id="pagination"></div>
    
    <div class="footer">
        <p>台灣場地管理系統 © 2026 | 資料來源: 官方網站</p>
        <p style="margin-top: 10px; font-size: 12px; color: #999;">
            💡 提示：編輯後的資料會暫存於瀏覽器，請記得點擊「匯出 JSON」下載更新後的資料
        </p>
    </div>
    
    <!-- 編輯 Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h2>✏️ 編輯場地資料</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                
                <div class="form-group">
                    <label>場地名稱 *</label>
                    <input type="text" id="editName" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>城市 *</label>
                        <input type="text" id="editCity" required>
                    </div>
                    <div class="form-group">
                        <label>會議室名稱</label>
                        <input type="text" id="editRoomName">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>場地類型</label>
                        <select id="editVenueType">
                            <option value="飯店場地">飯店場地</option>
                            <option value="會議中心">會議中心</option>
                            <option value="展演場地">展演場地</option>
                            <option value="婚宴場地">婚宴場地</option>
                            <option value="咖啡廳">咖啡廳</option>
                            <option value="運動場地">運動場地</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>狀態</label>
                        <select id="editStatus">
                            <option value="上架">上架</option>
                            <option value="下架">下架</option>
                            <option value="待審核">待審核</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>容納人數（劇院式）</label>
                        <input type="number" id="editCapacity">
                    </div>
                    <div class="form-group">
                        <label>容納人數（教室式）</label>
                        <input type="number" id="editCapacityClassroom">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>半天價格（元）</label>
                        <input type="number" id="editPriceHalfDay">
                    </div>
                    <div class="form-group">
                        <label>全天價格（元）</label>
                        <input type="number" id="editPriceFullDay">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>地址</label>
                    <input type="text" id="editAddress">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>聯絡人</label>
                        <input type="text" id="editContactPerson">
                    </div>
                    <div class="form-group">
                        <label>聯絡電話</label>
                        <input type="text" id="editContactPhone">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>聯絡 Email</label>
                    <input type="email" id="editContactEmail">
                </div>
                
                <div class="form-group">
                    <label>場地照片 URL</label>
                    <input type="url" id="editPhotoUrl" placeholder="https://example.com/photo.jpg">
                </div>
                
                <div class="form-group">
                    <label>官方網站 URL</label>
                    <input type="url" id="editUrl" placeholder="https://example.com">
                </div>
                
                <div class="form-group">
                    <label>設備</label>
                    <textarea id="editEquipment" placeholder="投影設備、音響等"></textarea>
                </div>
                
                <div class="form-group">
                    <label>備註</label>
                    <textarea id="editNotes" placeholder="其他備註事項"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveVenue()">💾 儲存變更</button>
            </div>
        </div>
    </div>
    
    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // 全局變數
        let allVenues = [];
        let filteredVenues = [];
        let modifiedVenues = {};
        let currentPage = 1;
        const itemsPerPage = 30;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadVenues();
            
            // 綁定篩選器事件
            document.getElementById('searchInput').addEventListener('input', debounce(applyFilters, 300));
            document.getElementById('cityFilter').addEventListener('change', applyFilters);
            document.getElementById('typeFilter').addEventListener('change', applyFilters);
            document.getElementById('photoFilter').addEventListener('change', applyFilters);
            document.getElementById('statusFilter').addEventListener('change', applyFilters);
        });
        
        // 防抖函數
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
        
        // 載入場地資料
        async function loadVenues() {
            try {
                // 嘗試從 localStorage 載入已修改的資料
                const savedModifications = localStorage.getItem('venueModifications');
                if (savedModifications) {
                    modifiedVenues = JSON.parse(savedModifications);
                }
                
                const response = await fetch('/api/venues');
                if (!response.ok) {
                    throw new Error('無法載入資料');
                }
                const data = await response.json();
                allVenues = data.venues;
                
                // 應用已修改的資料
                allVenues = allVenues.map(venue => {
                    if (modifiedVenues[venue.id]) {
                        return { ...venue, ...modifiedVenues[venue.id], _modified: true };
                    }
                    return venue;
                });
                
                // 初始化篩選器選項
                initFilterOptions();
                
                // 應用篩選並顯示
                applyFilters();
                
                showToast('資料載入成功！', 'success');
            } catch (error) {
                console.error('載入失敗:', error);
                document.getElementById('venuesGrid').innerHTML = `
                    <div class="loading">
                        <p style="color: #dc3545;">❌ 載入失敗: ${error.message}</p>
                        <p style="margin-top: 10px;">請確認 venues-all-cities.json 檔案存在</p>
                    </div>
                `;
            }
        }
        
        // 初始化篩選器選項
        function initFilterOptions() {
            const cities = [...new Set(allVenues.map(v => v.city).filter(Boolean))].sort();
            const types = [...new Set(allVenues.map(v => v.venueType).filter(Boolean))].sort();
            
            const cityFilter = document.getElementById('cityFilter');
            cities.forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                cityFilter.appendChild(option);
            });
            
            const typeFilter = document.getElementById('typeFilter');
            types.forEach(type => {
                const option = document.createElement('option');
                option.value = type;
                option.textContent = type;
                typeFilter.appendChild(option);
            });
        }
        
        // 應用篩選
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const city = document.getElementById('cityFilter').value;
            const type = document.getElementById('typeFilter').value;
            const photo = document.getElementById('photoFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            filteredVenues = allVenues.filter(venue => {
                // 搜尋條件
                if (search && !venue.name.toLowerCase().includes(search) && 
                    !venue.city?.toLowerCase().includes(search) &&
                    !venue.roomName?.toLowerCase().includes(search)) {
                    return false;
                }
                
                // 城市篩選
                if (city && venue.city !== city) return false;
                
                // 類型篩選
                if (type && venue.venueType !== type) return false;
                
                // 照片狀態篩選
                if (photo === 'hasPhoto' && !hasRealPhoto(venue)) return false;
                if (photo === 'noPhoto' && hasRealPhoto(venue)) return false;
                
                // 狀態篩選
                if (status && venue.status !== status) return false;
                
                return true;
            });
            
            currentPage = 1;
            renderVenues();
            renderPagination();
            updateStats();
        }
        
        // 檢查是否有真實照片（非佔位圖）
        function hasRealPhoto(venue) {
            const main = venue.images?.main || venue.photo;
            if (!main) return false;
            // 排除 Unsplash 佔位圖
            if (main.includes('unsplash.com')) return false;
            if (main.includes('data:image/svg')) return false;
            return true;
        }
        
        // 重置篩選
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('cityFilter').value = '';
            document.getElementById('typeFilter').value = '';
            document.getElementById('photoFilter').value = '';
            document.getElementById('statusFilter').value = '';
            applyFilters();
        }
        
        // 更新統計數字
        function updateStats() {
            document.getElementById('displayCount').textContent = filteredVenues.length;
            document.getElementById('totalCount').textContent = allVenues.length;
            document.getElementById('modifiedCount').textContent = Object.keys(modifiedVenues).length;
            document.getElementById('lastUpdate').textContent = `最後更新: ${new Date().toLocaleString('zh-TW')}`;
        }
        
        // 渲染場地卡片
        function renderVenues() {
            const grid = document.getElementById('venuesGrid');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const venuesToShow = filteredVenues.slice(start, end);
            
            if (venuesToShow.length === 0) {
                grid.innerHTML = `
                    <div class="loading">
                        <p>沒有找到符合條件的場地</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = venuesToShow.map(venue => createVenueCard(venue)).join('');
        }
        
        // 創建場地卡片 HTML
        function createVenueCard(venue) {
            const hasPhoto = hasRealPhoto(venue);
            const photoUrl = venue.images?.main || venue.photo || '';
            const capacity = venue.maxCapacityTheater || venue.maxCapacityClassroom || venue.capacity;
            const price = venue.priceHalfDay || venue.price;
            
            const photoHtml = hasPhoto 
                ? `<img src="${photoUrl}" class="venue-image" alt="${venue.name}" onerror="this.parentElement.innerHTML='<div class=\\'venue-image\\' style=\\'display:flex;align-items:center;justify-content:center;color:#999;\\'>載入失敗</div>'">`
                : `<div class="venue-image" style="display:flex;align-items:center;justify-content:center;color:#999;">無照片</div>`;
            
            const modifiedBadge = venue._modified ? '<span class="modified-badge">已修改</span>' : '';
            
            return `
                <div class="venue-card">
                    ${modifiedBadge}
                    <button class="edit-btn" onclick="openEditModal(${venue.id})" title="編輯">✏️</button>
                    ${photoHtml}
                    <div class="venue-content">
                        <div class="venue-name">${venue.name}</div>
                        <div class="venue-info"><strong>城市:</strong> ${venue.city || '-'}</div>
                        <div class="venue-info"><strong>會議室:</strong> ${venue.roomName || '-'}</div>
                        <div class="venue-info"><strong>類型:</strong> ${venue.venueType || '-'}</div>
                        <div class="venue-tags">
                            ${capacity ? `<span class="tag capacity">👥 ${capacity} 人</span>` : ''}
                            ${price ? `<span class="tag price">💰 $${price.toLocaleString()}/半天</span>` : ''}
                            <span class="tag ${!hasPhoto ? 'no-photo' : ''}">${hasPhoto ? '✅ 有照片' : '❌ 無照片'}</span>
                            ${venue.venueType ? `<span class="tag">${venue.venueType}</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 渲染分頁
        function renderPagination() {
            const totalPages = Math.ceil(filteredVenues.length / itemsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            
            // 上一頁
            html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">← 上一頁</button>`;
            
            // 頁碼
            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            
            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }
            
            if (startPage > 1) {
                html += `<button onclick="goToPage(1)">1</button>`;
                if (startPage > 2) html += `<button disabled>...</button>`;
            }
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<button disabled>...</button>`;
                html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }
            
            // 下一頁
            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">下一頁 →</button>`;
            
            pagination.innerHTML = html;
        }
        
        // 跳轉頁面
        function goToPage(page) {
            currentPage = page;
            renderVenues();
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 打開編輯 Modal
        function openEditModal(id) {
            const venue = allVenues.find(v => v.id === id);
            if (!venue) return;
            
            document.getElementById('editId').value = venue.id;
            document.getElementById('editName').value = venue.name || '';
            document.getElementById('editCity').value = venue.city || '';
            document.getElementById('editRoomName').value = venue.roomName || '';
            document.getElementById('editVenueType').value = venue.venueType || '飯店場地';
            document.getElementById('editStatus').value = venue.status || '上架';
            document.getElementById('editCapacity').value = venue.maxCapacityTheater || '';
            document.getElementById('editCapacityClassroom').value = venue.maxCapacityClassroom || '';
            document.getElementById('editPriceHalfDay').value = venue.priceHalfDay || '';
            document.getElementById('editPriceFullDay').value = venue.priceFullDay || '';
            document.getElementById('editAddress').value = venue.address || '';
            document.getElementById('editContactPerson').value = venue.contactPerson || '';
            document.getElementById('editContactPhone').value = venue.contactPhone || '';
            document.getElementById('editContactEmail').value = venue.contactEmail || '';
            document.getElementById('editPhotoUrl').value = venue.images?.main || venue.photo || '';
            document.getElementById('editUrl').value = venue.url || '';
            document.getElementById('editEquipment').value = venue.equipment || '';
            document.getElementById('editNotes').value = venue.notes || '';
            
            document.getElementById('editModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        // 關閉 Modal
        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        // 儲存場地資料
        function saveVenue() {
            const id = parseInt(document.getElementById('editId').value);
            const venue = allVenues.find(v => v.id === id);
            if (!venue) return;
            
            // 收集修改的資料
            const modifications = {
                name: document.getElementById('editName').value,
                city: document.getElementById('editCity').value,
                roomName: document.getElementById('editRoomName').value,
                venueType: document.getElementById('editVenueType').value,
                status: document.getElementById('editStatus').value,
                maxCapacityTheater: parseInt(document.getElementById('editCapacity').value) || null,
                maxCapacityClassroom: parseInt(document.getElementById('editCapacityClassroom').value) || null,
                priceHalfDay: parseInt(document.getElementById('editPriceHalfDay').value) || null,
                priceFullDay: parseInt(document.getElementById('editPriceFullDay').value) || null,
                address: document.getElementById('editAddress').value,
                contactPerson: document.getElementById('editContactPerson').value,
                contactPhone: document.getElementById('editContactPhone').value,
                contactEmail: document.getElementById('editContactEmail').value,
                url: document.getElementById('editUrl').value,
                equipment: document.getElementById('editEquipment').value,
                notes: document.getElementById('editNotes').value,
                _modified: true,
                _modifiedAt: new Date().toISOString()
            };
            
            // 更新照片 URL
            const photoUrl = document.getElementById('editPhotoUrl').value;
            if (photoUrl) {
                modifications.images = {
                    ...venue.images,
                    main: photoUrl,
                    lastUpdated: new Date().toISOString().split('T')[0]
                };
            }
            
            // 儲存到 modifiedVenues
            modifiedVenues[id] = modifications;
            
            // 更新 allVenues
            const index = allVenues.findIndex(v => v.id === id);
            allVenues[index] = { ...venue, ...modifications };
            
            // 儲存到 localStorage
            localStorage.setItem('venueModifications', JSON.stringify(modifiedVenues));
            
            // 重新渲染
            applyFilters();
            
            // 關閉 Modal
            closeModal();
            
            showToast('✅ 場地資料已更新！', 'success');
        }
        
        // 匯出 JSON
        function exportJSON() {
            // 合併原始資料和修改
            const exportData = allVenues.map(venue => {
                const { _modified, _modifiedAt, ...cleanVenue } = venue;
                if (modifiedVenues[venue.id]) {
                    const { _modified: m, _modifiedAt: ma, ...mods } = modifiedVenues[venue.id];
                    return { ...cleanVenue, ...mods };
                }
                return cleanVenue;
            });
            
            const json = JSON.stringify(exportData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `venues-all-cities-updated-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast(`✅ 已匯出 ${exportData.length} 筆場地資料！`, 'success');
        }
        
        // 顯示提示訊息
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // ESC 關閉 Modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
        
        // 點擊 Modal 外部關閉
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
