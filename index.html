<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EventMaster 活動大師 - 台灣活動場地查詢平台，526 個場地即時查詢，AI 24小時線上諮詢">
    <title>EventMaster 活動大師 - 台灣活動場地查詢平台</title>
    <link rel="stylesheet" href="public/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ===== 品牌標題 ===== -->
    <header class="main-header">
        <div class="header-content">
            <h1 class="brand-title">🎉 EventMaster 活動大師</h1>
            <p class="brand-subtitle">找場地，問 EM 就夠了！</p>
        </div>
    </header>

    <!-- ===== 服務類型選擇器 ===== -->
    <section class="service-selector-section" id="serviceSelectorSection">
        <div class="section-header">
            <h2 class="section-title">選擇服務類型</h2>
            <p class="section-subtitle">一站式滿足你的活動需求</p>
        </div>
        <div class="service-grid">
            <div class="service-card active" onclick="selectService('venue')">
                <div class="service-icon">🏢</div>
                <h3 class="service-name">活動場地</h3>
                <p class="service-desc">會議室、宴會廳、展演空間</p>
                <span class="service-badge">526 個場地</span>
            </div>
            <div class="service-card" onclick="selectService('catering')">
                <div class="service-icon">🍽️</div>
                <h3 class="service-name">活動餐飲</h3>
                <p class="service-desc">茶點、外燴、自助餐</p>
                <span class="service-badge coming-soon">即將推出</span>
            </div>
            <div class="service-card" onclick="selectService('production')">
                <div class="service-icon">🎨</div>
                <h3 class="service-name">活動製作物</h3>
                <p class="service-desc">背板、佈置、禮品、印刷</p>
                <span class="service-badge coming-soon">即將推出</span>
            </div>
            <div class="service-card" onclick="selectService('execution')">
                <div class="service-icon">🎬</div>
                <h3 class="service-name">活動執行</h3>
                <p class="service-desc">主持人、樂隊、攝影、服務人員</p>
                <span class="service-badge coming-soon">即將推出</span>
            </div>
        </div>
    </section>

    <!-- ===== 活動類型選擇器 (Apple 產品選擇風格) ===== -->
    <section class="type-selector-section" id="typeSelectorSection">
        <div class="section-header">
            <h1 class="section-title">選擇你的活動類型</h1>
            <p class="section-subtitle">找到最適合的場地，讓活動更完美</p>
        </div>
        
        <!-- 左右滑動選擇器 -->
        <div class="type-carousel-container">
            <button class="carousel-nav carousel-prev" onclick="prevType()" aria-label="上一個">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            
            <div class="type-carousel" id="typeCarousel">
                <!-- 活動類型卡片會由 JS 動態生成 -->
            </div>
            
            <button class="carousel-nav carousel-next" onclick="nextType()" aria-label="下一個">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
        
        <!-- 指示器 -->
        <div class="carousel-indicators" id="carouselIndicators"></div>
    </section>

    <!-- ===== 場地列表 ===== -->
    <section class="venues-section" id="venuesSection" style="display: none;">
        <div class="section-header">
            <button class="back-button" onclick="goBack()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                返回選擇
            </button>
            <h1 class="section-title" id="venuesTitle">場地列表</h1>
            <p class="section-subtitle" id="venuesSubtitle">為你推薦最適合的場地</p>
        </div>
        
        <!-- 篩選器 -->
        <div class="filter-bar">
            <div class="filter-group">
                <select id="cityFilter" onchange="filterVenues()">
                    <option value="">所有縣市</option>
                </select>
                <select id="capacityFilter" onchange="filterVenues()">
                    <option value="">所有規模</option>
                    <option value="small">50人以下</option>
                    <option value="medium">50-200人</option>
                    <option value="large">200-500人</option>
                    <option value="xlarge">500人以上</option>
                </select>
                <select id="sortFilter" onchange="filterVenues()">
                    <option value="name-asc">場地名稱排序</option>
                    <option value="price-asc">價格由低到高</option>
                    <option value="price-desc">價格由高到低</option>
                    <option value="capacity-desc">容納人數由多到少</option>
                </select>
            </div>
            <!-- 快速篩選按鈕 -->
            <div class="quick-filters">
                <button class="quick-filter-btn" onclick="quickFilter('north')">📍 北北基</button>
                <button class="quick-filter-btn" onclick="quickFilter('all')">🌐 全台灣</button>
            </div>
            <div class="filter-count">
                <span id="venueCount">0</span> 個場地
            </div>
        </div>
        
        <!-- 場地網格 -->
        <div class="venues-grid" id="venuesGrid">
            <!-- 場地卡片由 JS 動態生成 -->
        </div>
    </section>

    <!-- ===== 場地詳情 Modal (Apple 風格) ===== -->
    <div class="modal" id="venueModal">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-container">
            <div class="modal-header">
                <button class="modal-close" onclick="closeModal()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-content" id="modalContent">
                <!-- 動態內容 -->
            </div>
        </div>
    </div>

    <!-- ===== 比較面板 (Apple 風格) ===== -->
    <div class="compare-panel" id="comparePanel">
        <div class="compare-panel-header">
            <div class="compare-panel-title">
                <span class="compare-icon">⬜</span>
                比較場地
                <span class="compare-count" id="compareCount">0</span>
            </div>
            <div class="compare-panel-actions">
                <button class="compare-clear" onclick="clearCompare()">清除全部</button>
                <button class="compare-view" onclick="showCompare()" id="compareViewBtn" disabled>
                    查看比較
                </button>
            </div>
        </div>
        <div class="compare-items" id="compareItems">
            <div class="compare-empty">選擇場地以開始比較</div>
        </div>
    </div>

    <!-- ===== 比較結果 Modal ===== -->
    <div class="modal compare-modal" id="compareModal">
        <div class="modal-backdrop" onclick="closeCompareModal()"></div>
        <div class="modal-container modal-large">
            <div class="modal-header">
                <h2 class="modal-title">場地比較</h2>
                <button class="modal-close" onclick="closeCompareModal()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="compare-content" id="compareContent">
                <!-- 動態內容 -->
            </div>
        </div>
    </div>

    <script src="public/script.js"></script>
</body>
</html>
